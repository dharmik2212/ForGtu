<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GTU PDF URL Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS --> 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #f0f4fd 0%, #e0e8f8 100%);
      color: #333;
    }
    .content {
      flex: 1 0 auto;
    }
    /* Modern Glassmorphic Card */
    .modern-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
    }
    /* Stylish Inputs */
    .form-control, .form-select {
      background-color: rgba(255, 255, 255, 0.9);
      border: 1px solid #d1d9e6;
      border-radius: 0.75rem;
      padding: 0.6rem 1rem;
      transition: all 0.3s ease;
    }
    .form-control:focus, .form-select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
    }
    /* Modern Gradients for Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 0.75rem;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
    }
    .btn-outline-primary {
      color: #764ba2;
      border-color: #764ba2;
      border-radius: 0.75rem;
      font-weight: 500;
    }
    .btn-outline-primary:hover {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: #fff;
    }
    .papers-container {
      max-height: 400px;
      overflow-y: auto;
    }
    .papers-container::-webkit-scrollbar {
      width: 6px;
    }
    .papers-container::-webkit-scrollbar-thumb {
      background-color: #ccc;
      border-radius: 4px;
    }
    .mode-switcher {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      padding: 0.35rem;
      border-radius: 2rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .mode-switcher .btn {
      border-radius: 1.5rem;
      border: none;
      padding: 0.4rem 1.2rem;
    }
    .hidden {
      display: none;
    }
    /* Modern Footer */
    footer {
      background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
      color: white;
      padding: 2rem 0;
      margin-top: 3rem;
      flex-shrink: 0;
      border-top-left-radius: 2rem;
      border-top-right-radius: 2rem;
    }
    .social-links a {
      color: white;
      margin-right: 1.2rem;
      font-size: 1.5rem;
      transition: all 0.3s;
      display: inline-block;
    }
    .social-links a:hover {
      transform: scale(1.1) translateY(-2px);
      color: #e0e8f8;
      text-decoration: none;
    }
    .title-gradient {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }
    /* Modern Results UI */
    .modern-alert {
      background: rgba(255, 255, 255, 0.9);
      border-left: 5px solid #667eea;
      border-radius: 1rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      padding: 1.25rem;
    }
    .modern-list-item {
      border: 1px solid #e0e8f8;
      border-radius: 0.75rem !important;
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.8);
    }
    .modern-list-item:hover {
      background: #fff;
      transform: translateX(5px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
      border-color: #667eea;
    }
    .card-header-gradient {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-top-left-radius: 1.5rem !important;
      border-top-right-radius: 1.5rem !important;
      border-bottom: none;
    }
    @media (max-width: 576px) {
      .mode-switcher {
        top: 10px;
        right: 10px;
      }
      .mode-switcher .btn {
        padding: 0.25rem 0.6rem;
        font-size: 0.85rem;
      }
      footer {
        padding: 1.5rem 0;
        text-align: center;
        border-radius: 0;
      }
      .social-links {
        margin-top: 1rem;
      }
    }
  </style>
</head>
<body class="text-dark">
  <div class="content">
    <!-- Mode Switcher -->
    <div class="mode-switcher btn-group" role="group">
      <button type="button" id="papersModeBtn" class="btn btn-primary active">
        <i class="fas fa-file-pdf me-1"></i> Papers
      </button>
      <button type="button" id="syllabusModeBtn" class="btn btn-outline-primary">
        <i class="fas fa-book me-1"></i> Syllabus
      </button>
    </div>

    <div class="container py-5 mt-4">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card modern-card border-0">
            <div class="card-body p-5">
              <h2 class="card-title text-center mb-4 title-gradient" id="formTitle">GTU Papers URL Generator</h2>

              <!-- Papers Form -->
              <form id="pdfForm" class="mode-content">
                <div class="mb-3">
                  <label for="season" class="form-label">Season (e.g., W2024)</label>
                  <input type="text" id="season" class="form-control" required>
                </div>

                <div class="mb-3">
                  <label for="degree" class="form-label">Degree</label>
                  <div class="input-group">
                    <select id="degree" class="form-select" required>
                      <option value="" selected disabled>Select Degree</option>
                      <option value="AF">AF</option>
                      <option value="BA">BA</option>
                      <option value="BB">BB</option>
                      <option value="BC">BC</option>
                      <option value="BD">BD</option>
                      <option value="BE">BE</option>
                      <option value="BESP">BESP</option>
                      <option value="BH">BH</option>
                      <option value="BI">BI</option>
                      <option value="BL">BL</option>
                      <option value="BM">BM</option>
                      <option value="BN">BN</option>
                      <option value="BP">BP</option>
                      <option value="BPSP">BPSP</option>
                      <option value="BS">BS</option>
                      <option value="BT">BT</option>
                      <option value="BV">BV</option>
                      <option value="CI">CI</option>
                      <option value="CS">CS</option>
                      <option value="DA">DA</option>
                      <option value="DB">DB</option>
                      <option value="DH">DH</option>
                      <option value="DI">DI</option>
                      <option value="DISP">DISP</option>
                      <option value="DM">DM</option>
                      <option value="DP">DP</option>
                      <option value="DS">DS</option>
                      <option value="DV">DV</option>
                      <option value="EP">EP</option>
                      <option value="FD">FD</option>
                      <option value="HM">HM</option>
                      <option value="IB">IB</option>
                      <option value="IC">IC</option>
                      <option value="IM">IM</option>
                      <option value="MA">MA</option>
                      <option value="MB">MB</option>
                      <option value="MC">MC</option>
                      <option value="MCSP">MCSP</option>
                      <option value="MD">MD</option>
                      <option value="ME">ME</option>
                      <option value="MH">MH</option>
                      <option value="ML">ML</option>
                      <option value="MN">MN</option>
                      <option value="MP">MP</option>
                      <option value="MR">MR</option>
                      <option value="MS">MS</option>
                      <option value="MT">MT</option>
                      <option value="MV">MV</option>
                      <option value="PB">PB</option>
                      <option value="PD">PD</option>
                      <option value="PH">PH</option>
                      <option value="PM">PM</option>
                      <option value="PP">PP</option>
                      <option value="PR">PR</option>
                      <option value="TE">TE</option>
                      <option value="VP">VP</option>
                    </select>
                    <button type="button" id="getAllPapers" class="btn btn-primary">
                      <i class="fas fa-copy me-1"></i> Get All Papers
                    </button>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="subject_code" class="form-label">Subject Code (e.g., 3160716)</label>
                  <input type="text" id="subject_code" class="form-control" required>
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary">
                    <i class="fas fa-download me-1"></i> Get PDF
                  </button>
                </div>
              </form>

              <!-- Syllabus Form -->
              <form id="syllabusForm" class="mode-content hidden">
                <div class="mb-3">
                  <label for="syllabus_subject_code" class="form-label">Subject Code (e.g., 3160716)</label>
                  <input type="text" id="syllabus_subject_code" class="form-control" required>
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary">
                    <i class="fas fa-download me-1"></i> Get Syllabus
                  </button>
                </div>
              </form>

              <!-- Papers Results -->
              <div id="allPapersResult" class="mt-4 d-none">
                <div class="card modern-card border-0">
                  <div class="card-header card-header-gradient p-3">
                    <h5 class="mb-0 fw-semibold text-white"><i class="fas fa-list me-2"></i>All Available Papers</h5>
                  </div>
                  <div class="card-body papers-container px-3 py-4">
                    <div id="papersList" class="list-group border-0">
                      <!-- Papers will be added here dynamically -->
                    </div>
                  </div>
                </div>
              </div>

              <!-- Syllabus Results -->
              <div id="syllabusResult" class="modern-alert mt-4 d-none">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                  <div>
                    <h5 class="mb-1 text-dark fw-semibold" id="syllabusResultTitle"><i class="fas fa-check-circle text-success me-2"></i>Syllabus Found!</h5>
                    <div class="text-muted small ms-4" id="syllabusSubjectCode"></div>
                  </div>
                  <a id="syllabusLink" href="#" target="_blank" class="btn btn-primary px-3 py-2 rounded-pill">
                    <i class="fas fa-download me-1"></i> Download
                  </a>
                </div>
              </div>

              <!-- Single PDF Result -->
              <div id="result" class="modern-alert mt-4 d-none">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                  <div>
                    <h5 class="mb-1 text-dark fw-semibold" id="resultTitle"><i class="fas fa-check-circle text-success me-2"></i>Paper Found!</h5>
                    <div class="text-muted small ms-4" id="resultDetails"></div>
                  </div>
                  <a id="pdfLink" href="#" target="_blank" class="btn btn-primary px-3 py-2 rounded-pill">
                    <i class="fas fa-download me-1"></i> Download
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="container-fluid">
    <div class="container">
      <div class="row">
        <div class="col-12 text-center">
          <p class="mb-2">Designed by Dharmik Tarpada</p>
          <div class="social-links">
            <a href="https://github.com/dharmik2212" target="_blank" title="GitHub">
              <i class="fab fa-github"></i>
            </a>
            <a href="https://www.instagram.com/dharmik_tarpada/" target="_blank" title="Instagram">
              <i class="fab fa-instagram"></i>
            </a>
            <a href="https://in.linkedin.com/in/dharmik-tarpada-439396272" target="_blank" title="LinkedIn">
              <i class="fab fa-linkedin"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Mode switching functionality
    function switchToPapers() {
      document.getElementById('papersModeBtn').classList.add('active', 'btn-primary');
      document.getElementById('papersModeBtn').classList.remove('btn-outline-primary');
      document.getElementById('syllabusModeBtn').classList.add('btn-outline-primary');
      document.getElementById('syllabusModeBtn').classList.remove('active', 'btn-primary');
      
      document.getElementById('pdfForm').classList.remove('hidden');
      document.getElementById('syllabusForm').classList.add('hidden');
      document.getElementById('formTitle').textContent = "GTU Papers URL Generator";
      
      // Hide results
      document.getElementById('syllabusResult').classList.add('d-none');
    }

    function switchToSyllabus() {
      document.getElementById('syllabusModeBtn').classList.add('active', 'btn-primary');
      document.getElementById('syllabusModeBtn').classList.remove('btn-outline-primary');
      document.getElementById('papersModeBtn').classList.add('btn-outline-primary');
      document.getElementById('papersModeBtn').classList.remove('active', 'btn-primary');
      
      document.getElementById('syllabusForm').classList.remove('hidden');
      document.getElementById('pdfForm').classList.add('hidden');
      document.getElementById('formTitle').textContent = "GTU Syllabus URL Generator";
      
      // Hide results
      document.getElementById('allPapersResult').classList.add('d-none');
      document.getElementById('result').classList.add('d-none');
    }

    document.getElementById('papersModeBtn').addEventListener('click', switchToPapers);
    document.getElementById('syllabusModeBtn').addEventListener('click', switchToSyllabus);

    // Initialize in papers mode
    switchToPapers();

    // Papers Form Submission
    document.getElementById('pdfForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const season = document.getElementById('season').value.trim();
      const degree = document.getElementById('degree').value.trim();
      const subjectCode = document.getElementById('subject_code').value.trim();

      if (!season || !degree || !subjectCode) {
        alert("Please fill all fields.");
        return;
      }

      const pdfUrl = `https://gtu.ac.in/uploads/${season}/${degree}/${subjectCode}.pdf`;
      
      // Update the result display
      document.getElementById('resultTitle').textContent = `${season} Paper`;
      document.getElementById('resultDetails').textContent = `Subject: ${subjectCode} | Degree: ${degree}`;
      
      const linkEl = document.getElementById('pdfLink');
      linkEl.href = pdfUrl;
      
      // Show the result
      document.getElementById('result').classList.remove('d-none');
      document.getElementById('allPapersResult').classList.add('d-none');
      
      // Scroll to the result
      document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    });

    // Get All Papers functionality
    document.getElementById('getAllPapers').addEventListener('click', async function() {
      const degree = document.getElementById('degree').value.trim();
      const subjectCode = document.getElementById('subject_code').value.trim();

      if (!degree || !subjectCode) {
        alert("Please select degree and enter subject code.");
        return;
      }

      const papersList = document.getElementById('papersList');
      papersList.innerHTML = '<div class="text-center py-3"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">Validating URLs in background...</p></div>';

      // Show the all papers result area
      document.getElementById('allPapersResult').classList.remove('d-none');
      document.getElementById('result').classList.add('d-none');
      document.getElementById('allPapersResult').scrollIntoView({ behavior: 'smooth' });

      // Generate a list of recent seasons to check
      const currentYear = new Date().getFullYear();
      const seasonsToCheck = [];
      for (let y = currentYear; y >= 2018; y--) {
        seasonsToCheck.push(`W${y}`);
        seasonsToCheck.push(`S${y}`);
      }

      // Asynchronously validate each URL in the background
      const validationPromises = seasonsToCheck.map(async (season) => {
        const url = `https://gtu.ac.in/uploads/${season}/${degree}/${subjectCode}.pdf`;
        try {
          // Using fetch to validate. Note: Depending on server config, this might face CORS issues.
          const response = await fetch(url, { method: 'HEAD' });
          if (response.ok || response.status === 200) {
            return { season, url, valid: true };
          }
        } catch (error) {
          // If fetch fails (like CORS or network), we mark it invalid
        }
        return { season, url, valid: false };
      });

      Promise.all(validationPromises).then((results) => {
        papersList.innerHTML = '';
        let validPapersCount = 0;

        results.forEach(paper => {
          if (paper.valid) {
            validPapersCount++;
            const paperItem = document.createElement('a');
            paperItem.href = paper.url;
            paperItem.target = '_blank';
            paperItem.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center modern-list-item text-decoration-none';
            paperItem.innerHTML = `
              <div class="fw-medium text-dark"><i class="far fa-file-pdf text-danger me-2"></i> ${paper.season} - <span class="text-muted small">${subjectCode}</span></div>
              <span class="btn btn-sm btn-outline-primary rounded-circle" style="padding: 0.25rem 0.5rem;">
                <i class="fas fa-arrow-right"></i>
              </span>
            `;
            papersList.appendChild(paperItem);
          }
        });

        if (validPapersCount === 0) {
           papersList.innerHTML = `
            <div class="alert alert-warning mb-0">
               No valid papers found for this subject code, or URL validation was blocked by the browser (CORS).<br>
               <strong>Note:</strong> You can still try manual season search if papers are available.
            </div>`;
        }
      });
    });

    // Syllabus Form Submission
    document.getElementById('syllabusForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const subjectCode = document.getElementById('syllabus_subject_code').value.trim();
      
      if (!subjectCode) {
        alert("Please enter subject code.");
        return;
      }
      
      // Generate syllabus URL (adjust this pattern as needed)
      const syllabusUrl = `https://s3-ap-southeast-1.amazonaws.com/gtusitecirculars/Syallbus/${subjectCode}.pdf`;
     
      // Update the result display
      document.getElementById('syllabusResultTitle').textContent = `Syllabus for ${subjectCode}`;
      document.getElementById('syllabusSubjectCode').textContent = `Subject Code: ${subjectCode}`;
      
      const linkEl = document.getElementById('syllabusLink');
      linkEl.href = syllabusUrl;
      
      // Show the result
      document.getElementById('syllabusResult').classList.remove('d-none');
      
      // Scroll to the result
      document.getElementById('syllabusResult').scrollIntoView({ behavior: 'smooth' });
    });
 
// Disable right-click
document.addEventListener('contextmenu', (e) => e.preventDefault());

// Disable F12, Ctrl+Shift+I, Ctrl+U
document.onkeydown = function(e) {
  if (
    e.key === "F12" ||
    (e.ctrlKey && e.shiftKey && e.key === "I") || // Chrome/Firefox/Edge DevTools
    (e.ctrlKey && e.key === "U") // View Source
  ) {
    e.preventDefault();
    alert("Developer tools are disabled!");
    return false;
  }
}
  </script>
</body>
</html>
